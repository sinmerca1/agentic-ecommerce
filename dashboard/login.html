<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Agent Control Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #00ff41;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      border: 2px solid #00ff41;
      padding: 40px;
      background: #0f1419;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
      border-radius: 5px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-size: 24px;
      color: #00ff41;
      margin-bottom: 5px;
      text-shadow: 0 0 10px #00ff41;
    }

    .login-header p {
      color: #00cc33;
      font-size: 12px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #00ff41;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #1a1f3a;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      border-radius: 3px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }

    input::placeholder {
      color: #00ff41;
      opacity: 0.5;
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background: #00ff41;
      border: 1px solid #00ff41;
      color: #0a0e27;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .login-button:hover {
      background: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    .login-button:active {
      transform: scale(0.98);
    }

    .login-button:disabled {
      background: #666;
      border-color: #666;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .error-message {
      color: #ff3333;
      background: rgba(255, 51, 51, 0.1);
      padding: 12px;
      border: 1px solid #ff3333;
      border-radius: 3px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #00ff41;
      font-size: 12px;
      margin-top: 10px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #00ff41;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .success-message {
      color: #00ff41;
      background: rgba(0, 255, 65, 0.1);
      padding: 12px;
      border: 1px solid #00ff41;
      border-radius: 3px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .info-text {
      color: #00cc33;
      font-size: 11px;
      margin-top: 20px;
      text-align: center;
      line-height: 1.6;
    }

    .info-text strong {
      color: #00ff41;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 AGENT CONTROL</h1>
      <p>Admin Login Required</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="login-button" id="loginBtn">Login</button>
      <div class="loading" id="loading">
        <span class="spinner"></span>Authenticating...
      </div>
    </form>

    <div class="info-text">
      <p>
        <strong>Default Credentials:</strong><br>
        Username: <strong>admin</strong><br>
        Password: Check server logs or .env
      </p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const loading = document.getElementById('loading');

    // Check if already logged in
    function checkAuth() {
      const token = localStorage.getItem('authToken') || getCookie('authToken');
      if (token) {
        // Verify token is still valid
        fetch('/api/auth/me', {
          headers: {
            Authorization: `Bearer ${token}`,
          },
        })
          .then(res => {
            if (res.ok) {
              // Token is valid, redirect to dashboard
              window.location.href = '/index.html';
            } else {
              // Token is invalid, clear and show login
              localStorage.removeItem('authToken');
            }
          })
          .catch(() => {
            // Error checking token, show login
            localStorage.removeItem('authToken');
          });
      }
    }

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }

    loginForm.addEventListener('submit', async e => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError('Username and password are required');
        return;
      }

      loginBtn.disabled = true;
      loading.classList.add('show');
      errorMessage.classList.remove('show');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.message || 'Login failed');
          return;
        }

        // Store token
        localStorage.setItem('authToken', data.token);

        showSuccess('Login successful! Redirecting...');

        // Redirect after brief delay
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1000);
      } catch (error) {
        showError('Connection error. Please try again.');
        console.error('Login error:', error);
      } finally {
        loginBtn.disabled = false;
        loading.classList.remove('show');
      }
    });

    function showError(msg) {
      errorMessage.textContent = '❌ ' + msg;
      errorMessage.classList.add('show');
    }

    function showSuccess(msg) {
      successMessage.textContent = '✅ ' + msg;
      successMessage.classList.add('show');
    }

    // Check auth on page load
    checkAuth();

    // Focus on username field
    usernameInput.focus();
  </script>
</body>
</html>
